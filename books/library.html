<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Library — My Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages/library.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="topbar-title">Library</div>
    <div class="topbar-right">
      <a class="search-shortcut icon-btn" href="search.html" aria-label="Search">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-list" aria-label="List view" onclick="setView('list')">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="3"  width="14" height="2" rx="1" fill="currentColor"/>
            <rect x="1" y="7"  width="14" height="2" rx="1" fill="currentColor"/>
            <rect x="1" y="11" width="14" height="2" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button class="view-btn" id="btn-grid" aria-label="Grid view" onclick="setView('grid')">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="filters-wrap">
    <div class="filters-scroll" id="filters-scroll">
      <button class="chip active" data-filter="all"    onclick="setFilter('all',    this)">All</button>
      <button class="chip"        data-filter="read"   onclick="setFilter('read',   this)">Read</button>
      <button class="chip"        data-filter="unread" onclick="setFilter('unread', this)">Unread</button>
    </div>
  </div>

  <div class="meta-bar">
    <span class="count-text" id="count-text"></span>
    <button class="sort-btn" onclick="cycleSort()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="sort-label">A–Z</span>
    </button>
  </div>

  <!-- list view -->
  <div class="scroll-outer" id="scroll-outer">
    <div class="scroll-inner" id="scroll-inner"></div>
    <div class="state-empty" id="state-empty" style="display:none">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <rect x="4"  y="4" width="4" height="16" rx="1" stroke="var(--ink-faint)" stroke-width="1.5"/>
          <rect x="10" y="4" width="4" height="16" rx="1" stroke="var(--ink-faint)" stroke-width="1.5"/>
          <rect x="16" y="4" width="4" height="16" rx="1" stroke="var(--ink-faint)" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="empty-title">Nothing here yet</div>
      <div class="empty-sub">No books in this category.</div>
    </div>
  </div>

  <!-- grid view -->
  <div class="grid-wrap" id="grid-wrap">
    <div class="grid-inner" id="grid-inner"></div>
  </div>

  <!-- alphabet jump -->
  <div class="alpha-bar" id="alpha-bar"></div>
  <div class="jump-toast" id="jump-toast"></div>

  <nav class="nav">
    <button class="nav-item" onclick="location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 12L12 4l9 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="10" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="16" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="nav-label">Library</span>
    </button>
    <button class="nav-item" onclick="location.href='scan.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Add</span>
    </button>
  </nav>

</div>
<script src="js/books.js"></script>
<script src="js/pages/library.js"></script>
</body>
</html>
