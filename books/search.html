<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Search — My Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages/search.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <a class="back-btn" href="index.html" aria-label="Back">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
        <path d="M13 5l-5 5 5 5" stroke="#7A6E62" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    <div class="topbar-title">Search</div>
  </header>

  <div class="search-wrap">
    <div class="search-field">
      <span class="search-icon">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <input class="search-input" id="search-input" type="search"
             placeholder="Title, author or ISBN…"
             autocomplete="off" autocorrect="off" spellcheck="false" autofocus>
      <button class="clear-btn" id="clear-btn" aria-label="Clear search">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2 2l8 8M10 2l-8 8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="filters-wrap">
    <div class="filters-scroll" id="filters-scroll">
      <button class="chip active" data-filter="all"    onclick="setFilter('all', this)">All</button>
      <button class="chip"        data-filter="read"   onclick="setFilter('read', this)">Read</button>
      <button class="chip"        data-filter="unread" onclick="setFilter('unread', this)">Unread</button>
    </div>
  </div>

  <div class="results-wrap" id="results-wrap">
    <div class="count-bar" id="count-bar" style="display:none">
      <span class="count-text" id="count-text"></span>
      <button class="sort-btn" onclick="cycleSort()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="sort-label">A–Z</span>
      </button>
    </div>

    <div class="state-idle" id="state-idle" style="display:none">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="var(--ink-faint)" stroke-width="1.5"/>
          <path d="M16.5 16.5L21 21" stroke="var(--ink-faint)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="state-empty-title">Search your shelf</div>
      <div class="state-empty-sub">Type a title, author name, or ISBN number</div>
    </div>

    <div class="state-no-results" id="state-no-results" style="display:none">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="var(--ink-faint)" stroke-width="1.5"/>
          <path d="M16.5 16.5L21 21" stroke="var(--ink-faint)" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M8 8l6 6M14 8l-6 6" stroke="var(--ink-faint)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="state-empty-title">No books found</div>
      <div class="state-empty-sub" id="no-results-sub">Nothing matches your search.</div>
      <a class="scan-prompt" id="scan-prompt" href="scan.html">
        <div class="scan-prompt-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3"    y="7" width="3"   height="10" rx="1"   fill="var(--teal)"/>
            <rect x="8"    y="7" width="1.5" height="10" rx="0.5" fill="var(--teal)"/>
            <rect x="11.5" y="7" width="2.5" height="10" rx="0.5" fill="var(--teal)"/>
            <rect x="15.5" y="7" width="1.5" height="10" rx="0.5" fill="var(--teal)"/>
            <rect x="18.5" y="7" width="2.5" height="10" rx="1"   fill="var(--teal)"/>
          </svg>
        </div>
        <div class="scan-prompt-text">
          <div class="scan-prompt-label">Try scanning instead</div>
          <div class="scan-prompt-sub">Use the camera to look up by barcode</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <path d="M7 5l5 5-5 5" stroke="var(--ink-faint)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </a>
    </div>

    <div class="book-list" id="book-list" style="display:none"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <nav class="nav">
    <button class="nav-item" onclick="location.href='index.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 12L12 4l9 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="10" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="16" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="nav-label">Library</span>
    </button>
    <button class="nav-item" onclick="location.href='scan.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Add</span>
    </button>
  </nav>

</div>
<script src="js/books.js"></script>
<script src="js/pages/search.js"></script>
</body>
</html>
