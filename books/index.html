<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My Books</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/pages/home.css">
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="app-title">nook<em>ly</em></div>
    <button class="settings-btn" aria-label="Settings" onclick="location.href='settings.html'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="#7A6E62" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="#7A6E62" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </header>

  <section class="hero">
    <div class="hero-eyebrow"></div>
    <h1 class="hero-heading">In a shop?<br><em>Check your shelf.</em></h1>
  </section>

  <div class="stats">
    <div class="stat-card teal">
      <div class="stat-number" id="stat-total">—</div>
      <div class="stat-label">books owned</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-number" id="stat-read">—</div>
      <div class="stat-label">read</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-number" id="stat-unread">—</div>
      <div class="stat-label">to read</div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn scan" onclick="location.href='scan.html'">
      <div class="btn-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="6" width="2.5" height="12" rx="1" fill="white"/>
          <rect x="7" y="6" width="1.5" height="12" rx="0.5" fill="white"/>
          <rect x="10.5" y="6" width="2" height="12" rx="0.5" fill="white"/>
          <rect x="14.5" y="6" width="1.5" height="12" rx="0.5" fill="white"/>
          <rect x="18" y="6" width="3" height="12" rx="1" fill="white"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-label">Scan barcode</div>
        <div class="btn-sub">Point camera at the back cover</div>
      </div>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M7 5l5 5-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="action-btn search" onclick="location.href='search.html'">
      <div class="btn-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="6.5" stroke="#2C4A35" stroke-width="1.5"/>
          <path d="M16.5 16.5L21 21" stroke="#2C4A35" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="btn-text">
        <div class="btn-label">Search collection</div>
        <div class="btn-sub">By title or author name</div>
      </div>
      <svg class="btn-arrow" width="18" height="18" viewBox="0 0 20 20" fill="none">
        <path d="M7 5l5 5-5 5" stroke="#1A1410" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <section class="recent">
    <div class="section-header">
      <div class="section-title">Recently added</div>
      <a class="section-link" href="library.html">See all →</a>
    </div>
    <div class="book-list" id="recent-list"></div>
  </section>

  <nav class="nav">
    <button class="nav-item active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M3 12L12 4l9 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="location.href='library.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="10" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
        <rect x="16" y="4" width="4" height="16" rx="1" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="nav-label">Library</span>
    </button>
    <button class="nav-item" onclick="location.href='scan.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="nav-label">Add</span>
    </button>
  </nav>

</div>
<script src="js/books.js"></script>
<script src="js/pages/home.js"></script>
</body>
</html>
